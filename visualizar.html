<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2230;
  --border: #2a3446;
  --border2: #3d4f6a;
  --text: #e6edf3;
  --muted: #8b9cad;
  --dim: #4a5568;
  --accent-t: #e63946;
  --accent-v: #2196f3;
  --accent-o: #ff9800;
  --gold: #f4c542;
  --green: #3fb950;
  --radius: 10px;
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* HEADER */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 16px;
}

.brand-logos {
  display: flex;
  align-items: center;
  gap: 8px;
}

.brand-pill {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.pill-t { background: rgba(230,57,70,0.15); color: var(--accent-t); border: 1px solid rgba(230,57,70,0.3); }
.pill-v { background: rgba(33,150,243,0.15); color: var(--accent-v); border: 1px solid rgba(33,150,243,0.3); }

.header-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}

.header-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 1px;
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--green);
  font-weight: 500;
}

.live-dot {
  width: 7px; height: 7px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.85); }
}

/* SEARCH BAR */
.search-section {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 40px;
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 220px;
  max-width: 400px;
}

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  stroke: var(--muted);
  fill: none;
}

#searchInput {
  width: 100%;
  padding: 10px 14px 10px 38px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}

#searchInput::placeholder { color: var(--dim); }
#searchInput:focus { border-color: var(--border2); }

.filter-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 8px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--muted);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
}

.filter-btn:hover { border-color: var(--border2); color: var(--text); }
.filter-btn.active-t { background: rgba(230,57,70,0.12); color: var(--accent-t); border-color: rgba(230,57,70,0.4); }
.filter-btn.active-v { background: rgba(33,150,243,0.12); color: var(--accent-v); border-color: rgba(33,150,243,0.4); }
.filter-btn.active-a { background: rgba(244,197,66,0.12); color: var(--gold); border-color: rgba(244,197,66,0.4); }

/* STATS */
.stats-row {
  padding: 10px 40px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 24px;
  font-size: 12px;
  color: var(--muted);
  background: var(--bg);
}

.stat strong { color: var(--text); font-weight: 600; }

/* CONTENT */
.content { padding: 28px 40px; }

.dept-block { margin-bottom: 28px; }

.dept-label {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}

.dept-stripe {
  width: 3px;
  height: 20px;
  border-radius: 3px;
}

.dept-text {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.dept-empresa {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.tag-t { background: rgba(230,57,70,0.1); color: var(--accent-t); }
.tag-v { background: rgba(33,150,243,0.1); color: var(--accent-v); }
.tag-o { background: rgba(255,152,0,0.1); color: var(--accent-o); }

.dept-n {
  font-size: 12px;
  color: var(--dim);
  margin-left: 4px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 10px;
}

/* CARD */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  transition: border-color .2s, transform .15s;
  cursor: default;
}

.card:hover {
  border-color: var(--border2);
  transform: translateY(-1px);
}

.card-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
}

.card-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}

.card-email {
  font-size: 11px;
  color: var(--dim);
  margin-top: 2px;
  word-break: break-all;
}

.divider {
  height: 1px;
  background: var(--border);
  margin-bottom: 12px;
}

.ramal-display {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 2px;
}

.ramal-label {
  font-size: 10px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}

/* EMPTY */
.empty {
  text-align: center;
  padding: 80px 20px;
  color: var(--dim);
}

.empty svg { width: 48px; height: 48px; stroke: var(--border); fill: none; margin-bottom: 12px; }
.empty p { font-size: 15px; }

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: var(--dim);
  border-top: 1px solid var(--border);
  margin-top: 20px;
}

@media (max-width: 640px) {
  .header, .search-section, .content, .stats-row { padding-left: 16px; padding-right: 16px; }
  .header { height: auto; padding-top: 14px; padding-bottom: 14px; }
}
</style>
</head>

function loadData() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    return s ? JSON.parse(s) : RAMAIS_INICIAIS;
  } catch { return RAMAIS_INICIAIS; }
}

let ramais = loadData();
let empFilter = '';

// listen for admin updates
window.addEventListener('storage', e => {
  if (e.key === STORAGE_KEY) { ramais = loadData(); render(); }
});

function initials(n) { return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }

function setEmp(btn, emp) {
  empFilter = emp;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-a','active-t','active-v'));
  if (!emp) btn.classList.add('active-a');
  else if (emp==='TECFAG') btn.classList.add('active-t');
  else btn.classList.add('active-v');
  render();
}

function getDeptColor(dept, empresa) {
  const palette = DEPT_PALETTES[empresa] || DEPT_PALETTES.OUTROS;
  const depts = [...new Set(ramais.filter(r=>r.empresa===empresa).map(r=>r.dept))].sort();
  return palette[depts.indexOf(dept) % palette.length] || palette[0];
}

function avatarColors(color) {
  return `background:${color}22;color:${color};`;
}

    (!empFilter || r.empresa === empFilter) &&
    (!dept || r.dept === dept) &&
    (!q || r.nome.toLowerCase().includes(q) || r.ramal.includes(q) || (r.email||'').toLowerCase().includes(q) || r.dept.toLowerCase().includes(q))
  );

  document.getElementById('statsRow').innerHTML =
    `<span class="stat"><strong>${filtered.length}</strong> ramais</span>` +
    `<span class="stat"><strong>${[...new Set(filtered.map(r=>r.dept))].length}</strong> departamentos</span>` +
    empresas.map(e=>`<span class="stat"><strong>${filtered.filter(r=>r.empresa===e).length}</strong> ${e}</span>`).join('');

  // filter dept selector
  const sel = document.getElementById('filterDept');
  const cur = sel.value;
  const allDepts = [...new Set(ramais.filter(r=>!empFilter||r.empresa===empFilter).map(r=>r.dept))].sort();
  sel.innerHTML = '<option value="">Todos os depto.</option>' +
    allDepts.map(d=>`<option value="${d}"${d===cur?' selected':''}>${d}</option>`).join('');

  if (!filtered.length) {
    document.getElementById('content').innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>Nenhum resultado encontrado.</p>
    </div>`;
    return;
  }

  // Group by empresa → dept
  const byEmpDept = {};
  filtered.forEach(r => {
    const key = `${r.empresa}|||${r.dept}`;
    (byEmpDept[key] = byEmpDept[key] || []).push(r);
  });

  document.getElementById('content').innerHTML = Object.entries(byEmpDept).map(([key, items]) => {
    const [emp, dept] = key.split('|||');
    const color = getDeptColor(dept, emp);
    const empTag = emp === 'TECFAG' ? 'tag-t' : emp === 'VALEM' ? 'tag-v' : 'tag-o';
    const cards = items.map(r => `
      <div class="card">
        <div class="card-top">
          <div class="avatar" style="${avatarColors(color)}">${initials(r.nome)}</div>
          <div>
            <div class="card-name">${r.nome}</div>
            ${r.email ? `<div class="card-email">${r.email}</div>` : ''}
          </div>
        </div>
        <div class="divider"></div>
        <div class="ramal-label">Ramal</div>
        <div class="ramal-display" style="color:${color};">${r.ramal}</div>
      </div>
    `).join('');

    return `<div class="dept-block">
      <div class="dept-label">
        <div class="dept-stripe" style="background:${color};"></div>
        <span class="dept-text">${dept}</span>
        <span class="dept-empresa ${empTag}">${emp}</span>
        <span class="dept-n">${items.length}</span>
      </div>
      <div class="grid">${cards}</div>
    </div>`;
  }).join('');
}

render();
</script>
</body>
</html>
